services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taledrop_novellaire}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PROJECT_NAME: TaleDrop-Novellaire
      ENVIRONMENT: development
      DEBUG: "True"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-taledrop_novellaire}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_secret_key_in_production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      REFRESH_TOKEN_EXPIRE_MINUTES: "10080"
      MAIL_USERNAME: ${MAIL_USERNAME:-example@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
      MAIL_FROM: ${MAIL_FROM:-example@example.com}
      MAIL_PORT: "587"
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_FROM_NAME: TaleDrop-Novellaire
      MAIL_STARTTLS: "True"
      MAIL_SSL_TLS: "False"
      FRONTEND_URL: http://localhost:3000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_changeme}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-changeme}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      CHROMA_PERSIST_DIR: /app/backend/chroma_db
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_chroma:/app/backend/chroma_db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  ollama_data:
  backend_uploads:
  backend_chroma:
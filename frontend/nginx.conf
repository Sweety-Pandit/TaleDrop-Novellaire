server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # react-router uses client-side routing (BrowserRouter), so any path
    # that doesn't match a real static file must still serve index.html
    # and let the router handle it — otherwise refreshing on e.g.
    # /novels/some-slug would 404 at the nginx level.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
